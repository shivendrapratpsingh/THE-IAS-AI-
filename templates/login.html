<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BASS 50 — Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body {
      background: #0A0A0A;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }

    /* Floating particles */
    @keyframes particleDrift {
      0%   { transform: translateY(-40px) rotate(0deg); opacity: 0; }
      10%  { opacity: var(--p-opacity); }
      90%  { opacity: var(--p-opacity); }
      100% { transform: translateY(110vh) rotate(var(--p-rot)); opacity: 0; }
    }
    .amb-particle {
      position: fixed; top: 0; font-size: var(--p-size); left: var(--p-x);
      animation: particleDrift var(--p-dur) linear var(--p-delay) infinite;
      pointer-events: none; z-index: 0;
    }

    .login-shell {
      width: 100%; max-width: 400px;
      padding: 0 24px;
      position: relative; z-index: 1;
    }

    /* Branding */
    .login-brand {
      text-align: center;
      margin-bottom: 48px;
    }
    .login-brand-icon {
      font-size: 52px; display: block; margin-bottom: 12px;
      filter: drop-shadow(0 4px 24px rgba(244,98,31,0.6));
    }
    .login-brand-name {
      font-size: 36px; font-weight: 900; color: #fff;
      letter-spacing: -1.5px; line-height: 1;
    }
    .login-brand-tag {
      font-size: 13px; color: rgba(255,255,255,0.4);
      font-weight: 600; margin-top: 8px;
    }

    /* Card */
    .login-card {
      background: #1C1C1E;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 32px 24px;
    }
    .login-card-title {
      font-size: 22px; font-weight: 900; color: #fff;
      margin-bottom: 6px;
    }
    .login-card-sub {
      font-size: 13px; color: rgba(255,255,255,0.4);
      font-weight: 500; margin-bottom: 28px; line-height: 1.5;
    }

    .field-label {
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.45);
      text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px;
    }
    .phone-wrap {
      display: flex; gap: 8px; margin-bottom: 20px;
    }
    .country-code {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 14px; padding: 16px 10px;
      font-size: 14px; font-weight: 700; color: #fff;
      font-family: 'Poppins', sans-serif; outline: none;
      -webkit-appearance: none; appearance: none; cursor: pointer;
      min-width: 88px;
    }
    .country-code:focus { border-color: #F4621F; }
    .country-code option { background: #1C1C1E; }
    .phone-input {
      flex: 1; background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 14px; padding: 16px 14px;
      font-size: 18px; font-weight: 700; color: #fff;
      font-family: 'Poppins', sans-serif; outline: none;
      letter-spacing: 1px;
    }
    .phone-input:focus { border-color: #F4621F; }
    .phone-input::placeholder { color: rgba(255,255,255,0.2); font-size: 15px; letter-spacing: 0; font-weight: 500; }

    .submit-btn {
      width: 100%; padding: 19px;
      background: linear-gradient(135deg, #F4621F 0%, #C94E18 100%);
      color: #fff; border: none; border-radius: 16px;
      font-size: 16px; font-weight: 800; font-family: 'Poppins', sans-serif;
      cursor: pointer; letter-spacing: .3px;
      box-shadow: 0 8px 28px rgba(244,98,31,0.4);
      transition: transform .15s;
    }
    .submit-btn:active { transform: scale(0.98); }

    .flash-err {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      border-radius: 12px; padding: 12px 16px; margin-bottom: 16px;
      font-size: 13px; color: #F87171; font-weight: 600;
    }

    /* Guest link */
    .guest-link {
      display: block; text-align: center; margin-top: 20px;
      color: rgba(255,255,255,0.3); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: color .2s;
    }
    .guest-link:hover { color: rgba(255,255,255,0.6); }

    /* Guest form (hidden by default) */
    .guest-form {
      display: none; margin-top: 20px;
      background: #1C1C1E; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 20px;
    }
    .guest-form.open { display: block; }
    .guest-input {
      width: 100%; background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12); border-radius: 12px;
      padding: 15px 14px; font-size: 15px; font-weight: 600; color: #fff;
      font-family: 'Poppins', sans-serif; outline: none; margin-bottom: 12px;
    }
    .guest-input:focus { border-color: #8B5CF6; }
    .guest-btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #7C3AED, #5B21B6);
      color: #fff; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 800; font-family: 'Poppins', sans-serif; cursor: pointer;
    }
  </style>
</head>
<body>

<!-- Ambient particles -->
<div id="ambientCanvas"></div>
<script>
(function(){
  const icons=['✏️','📚','📖','🖊️','📝','🎯'];
  const wrap=document.getElementById('ambientCanvas');
  for(let i=0;i<14;i++){
    const el=document.createElement('span');
    el.className='amb-particle';
    const size=10+Math.random()*13,x=Math.random()*96,
          dur=12+Math.random()*14,delay=-(Math.random()*dur),
          rot=(Math.random()-.5)*180+'deg';
    el.textContent=icons[Math.floor(Math.random()*icons.length)];
    el.style.cssText=`--p-size:${size}px;--p-x:${x}%;--p-dur:${dur}s;--p-delay:${delay}s;--p-rot:${rot};--p-opacity:${0.06+Math.random()*0.08};`;
    wrap.appendChild(el);
  }
})();
</script>

<div class="login-shell">

  <!-- Branding -->
  <div class="login-brand">
    <span class="login-brand-icon">🎯</span>
    <div class="login-brand-name">BASS 50</div>
    <div class="login-brand-tag">Your IAS Prep Companion</div>
  </div>

  <!-- Main card -->
  <div class="login-card">
    <div class="login-card-title">Welcome back 👋</div>
    <div class="login-card-sub">Enter your phone number to continue your preparation.</div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}{% for msg in messages %}
        <div class="flash-err">{{ msg }}</div>
      {% endfor %}{% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="field-label">Phone Number</div>
      <div class="phone-wrap">
        <select class="country-code" name="country_code">
          <option value="+91">🇮🇳 +91</option>
          <option value="+1">🇺🇸 +1</option>
          <option value="+44">🇬🇧 +44</option>
          <option value="+971">🇦🇪 +971</option>
          <option value="+61">🇦🇺 +61</option>
        </select>
        <input class="phone-input" type="tel" name="phone"
               maxlength="10" inputmode="numeric"
               placeholder="10-digit number" autofocus
               oninput="this.value=this.value.replace(/\D/g,'')">
      </div>
      <button type="submit" class="submit-btn">Continue →</button>
    </form>
  </div>

  <!-- Guest practice link -->
  <div class="guest-link" onclick="toggleGuest()">
    📚 Practice without an account
  </div>

  <div class="guest-form" id="guestForm">
    <div class="field-label" style="color:rgba(255,255,255,0.4);">Your Name</div>
    <form method="POST" action="{{ url_for('guest_login') }}">
      <input class="guest-input" type="text" name="name"
             placeholder="Enter your name" maxlength="40" required>
      <button type="submit" class="guest-btn">Start Practice →</button>
    </form>
  </div>

</div>

<script>
function toggleGuest() {
  const f = document.getElementById('guestForm');
  f.classList.toggle('open');
}
</script>
</body>
</html>
